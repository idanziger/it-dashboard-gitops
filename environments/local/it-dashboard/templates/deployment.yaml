# A Deployment tells Kubernetes:
# - what container image to run
# - how many replicas (copies) to keep running
# - what environment variables to inject
# - what port the container listens on
#
# The {{ .Values.xxx }} syntax is Helm templating — it reads from values.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-dashboard
  namespace: it-dashboard
  labels:
    app: it-dashboard
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: it-dashboard
  template:
    metadata:
      labels:
        app: it-dashboard
    spec:
      # Credentials for pulling the image from private ghcr.io
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: it-dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.app.port }}
          env:
            - name: NEXTAUTH_URL
              value: {{ .Values.env.NEXTAUTH_URL | quote }}
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}
            - name: AUTH_TRUST_HOST
              value: {{ .Values.env.AUTH_TRUST_HOST | quote }}
            # Path where the Google service account JSON is mounted inside the container
            - name: GOOGLE_SERVICE_ACCOUNT_KEY_PATH
              value: "/secrets/google-service-account.json"
            # All secrets pulled from the Kubernetes Secret object
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: it-dashboard-secrets
                  key: NEXTAUTH_SECRET_OOPS
            - name: AUTH_ALLOWED_EMAIL
              valueFrom:
                secretKeyRef:
                  name: it-dashboard-secrets
                  key: AUTH_ALLOWED_EMAIL
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: it-dashboard-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: it-dashboard-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_ADMIN_IMPERSONATE_EMAIL
              valueFrom:
                secretKeyRef:
                  name: it-dashboard-secrets
                  key: GOOGLE_ADMIN_IMPERSONATE_EMAIL
            - name: SENTINELONE_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: it-dashboard-secrets
                  key: SENTINELONE_BASE_URL
            - name: SENTINELONE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: it-dashboard-secrets
                  key: SENTINELONE_API_TOKEN
            - name: JUMPCLOUD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: it-dashboard-secrets
                  key: JUMPCLOUD_API_KEY
          # Mount the Google service account JSON file into the container
          volumeMounts:
            - name: google-sa-key
              mountPath: /secrets
              readOnly: true
      volumes:
        - name: google-sa-key
          secret:
            secretName: it-dashboard-secrets
            items:
              - key: google-service-account.json
                path: google-service-account.json
